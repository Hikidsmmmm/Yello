<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matte Red Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Get all game files dynamically
        const games = [
            { name: '3D Dash', file: 'games/3dash.html', emoji: '🚀' },
            { name: 'AI Game', file: 'games/AI.html', emoji: '🤖' },
            { name: 'Advance Wars', file: 'games/Advancewars.html', emoji: '⚔️' },
            { name: 'Aquapark', file: 'games/Aquapark.html', emoji: '🌊' },
            { name: 'BTD5', file: 'games/BTD5.html', emoji: '🎈' },
            { name: 'Backrooms', file: 'games/Backrooms2d.html', emoji: '📦' },
            { name: 'Ballistic', file: 'games/Ballistic.html', emoji: '🎯' },
            { name: 'Bank Robbery', file: 'games/Bankrobbery.html', emoji: '💰' },
            { name: 'Brawl Stars', file: 'games/BrawlStars.html', emoji: '⭐' },
            { name: 'Basket Random', file: 'games/basketrandom.html', emoji: '🏀' },
            { name: 'Brotato', file: 'games/brotato.html', emoji: '🥔' },
            { name: 'AI Chatbot', file: 'games/clai.html', emoji: '💬' },
            { name: 'Backrooms CL', file: 'games/clbackrooms.html', emoji: '🏚️' },
            { name: 'Fall Guys', file: 'games/clfallguys.html', emoji: '👥' },
            { name: 'Funny Shooter', file: 'games/clfunnyshooter2.html', emoji: '🔫' },
            { name: 'Gorilla Tag', file: 'games/clgorillatag.html', emoji: '🦍' },
            { name: 'Granny 2', file: 'games/clgranny2.html', emoji: '👵' },
            { name: 'Sandboxels', file: 'games/clsandboxels.html', emoji: '🎮' },
            { name: 'Cookie Clicker', file: 'games/cookieclicker.html', emoji: '🍪' },
            { name: 'Doge Miner', file: 'games/dogeminer.html', emoji: '🐕' },
            { name: 'Getaway Shootout', file: 'games/getawayshootout.html', emoji: '💨' },
            { name: 'Gladi Hoppers', file: 'games/gladihoppers.html', emoji: '🦗' },
            { name: 'Eaglercraft', file: 'games/EaglercraftX_1.8_u53_Offline_Signed.html', emoji: '⛏️' },
            { name: 'FNAF', file: 'games/FNAF.html', emoji: '🐻' },
            { name: 'FNAF 2', file: 'games/FNAF2.html', emoji: '🐻' },
            { name: 'FNAF 3', file: 'games/FNAF3.html', emoji: '🐻' },
            { name: 'FNAF 4', file: 'games/FNAF4.html', emoji: '🐻' },
            { name: 'Fallout', file: 'games/Fallout.html', emoji: '☢️' },
            { name: 'Gold Miner', file: 'games/Goldminer.html', emoji: '⛏️' },
            { name: 'Gun Spin', file: 'games/Gunspin.html', emoji: '🔄' },
            { name: 'Babel Tower', file: 'games/babeltower.html', emoji: '🏢' },
            { name: 'Portal', file: 'games/portal.html', emoji: '🔷' },
            { name: 'Shinobi', file: 'games/shinobi.html', emoji: '🥷' },
            { name: 'Shooter', file: 'games/shooter.html', emoji: '💣' },
            { name: 'Stick War', file: 'games/stickwar.html', emoji: '🎪' },
            { name: 'Sound Board', file: 'games/soundboard.html', emoji: '🎵' },
            { name: 'Source', file: 'games/source.html', emoji: '📜' }
        ];

        function loadGames() {
            const gameGrid = document.getElementById('game-grid');
            games.forEach(game => {
                const gameCard = document.createElement('a');
                gameCard.href = game.file;
                gameCard.target = '_blank';
                gameCard.rel = 'noopener noreferrer';
                gameCard.className = 'game-card';
                gameCard.innerHTML = `
                    <div class="game-thumbnail">${game.emoji}</div>
                    <span>${game.name}</span>
                `;
                gameGrid.appendChild(gameCard);
            });
        }

        window.addEventListener('DOMContentLoaded', loadGames);
    </script>
</head>
<body>

    <!-- CSS Controllers (Must remain at root level) -->
    <input type="radio" id="tab-home" name="nav" checked>
    <input type="radio" id="tab-games" name="nav">

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="logo">DASHBOARD</div>
        <ul class="nav-links">
            <li><label for="tab-home">Home</label></li>
            <li><label for="tab-games">Games</label></li>
        </ul>
    </aside>

    <!-- Main Content Wrapper -->
    <main class="content">

        <!-- TAB 1: HOME -->
        <div class="section" id="section-home">
            <h1>Home</h1>
            <div class="grid">
                <div class="card card-red">
                    <h3>Welcome Back</h3>
                    <p class="big-number">Active</p>
                    <a href="#" class="action-btn" style="background-color: rgba(255,255,255,0.2);">View Profile</a>
                </div>
                <div class="card">
                    <h3>Total Games</h3>
                    <p class="big-number">36+</p>
                </div>
            </div>
        </div>

        <!-- TAB 2: GAMES -->
        <div class="section" id="section-games">
            <h1>Games</h1>
            <div class="game-grid" id="game-grid">
                <!-- Games will be loaded here by JavaScript -->
            </div>
        </div>

    </main>

</body>
</html>
